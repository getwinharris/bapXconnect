<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bapXconnect - AI Chat Interface</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            padding: 16px 24px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #60a5fa;
        }

        .logo i {
            color: #3b82f6;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .model-selector {
            position: relative;
        }

        select {
            background: rgba(30, 41, 59, 0.8);
            color: #e2e8f0;
            border: 1px solid #475569;
            border-radius: 8px;
            padding: 8px 12px;
            padding-right: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 16px;
        }

        select:hover {
            border-color: #60a5fa;
        }

        .profile-btn {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid #475569;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #60a5fa;
            transition: all 0.2s ease;
        }

        .profile-btn:hover {
            border-color: #60a5fa;
            background: rgba(30, 64, 175, 0.2);
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-height: calc(100vh - 70px);
        }

        .chat-messages {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            gap: 16px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 16px;
        }

        .user-avatar {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
        }

        .assistant-avatar {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }

        .message-content {
            flex: 1;
            padding-top: 4px;
        }

        .message-role {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .message-text {
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .user-message .message-text {
            color: #e2e8f0;
        }

        .assistant-message .message-text {
            color: #cbd5e1;
        }

        .input-container {
            padding: 24px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid #334155;
        }

        .input-area {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        textarea {
            width: 100%;
            background: rgba(30, 41, 59, 0.8);
            color: #e2e8f0;
            border: 1px solid #475569;
            border-radius: 16px;
            padding: 16px 50px 16px 16px;
            font-size: 1rem;
            resize: none;
            min-height: 60px;
            max-height: 200px;
            line-height: 1.5;
            outline: none;
        }

        textarea:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
        }

        .send-btn {
            position: absolute;
            right: 16px;
            bottom: 16px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 12px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .send-btn:hover {
            background: #2563eb;
            transform: scale(1.05);
        }

        .send-btn:disabled {
            background: #64748b;
            cursor: not-allowed;
            transform: none;
        }

        .info-footer {
            text-align: center;
            padding: 16px;
            color: #94a3b8;
            font-size: 0.8rem;
            border-top: 1px solid #334155;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .header {
                padding: 12px 16px;
            }
            
            .chat-messages {
                padding: 16px;
            }
            
            .message {
                flex-direction: column;
                gap: 8px;
            }
            
            .avatar {
                width: 32px;
                height: 32px;
                font-size: 14px;
            }
            
            .input-container {
                padding: 16px;
            }
            
            .logo {
                font-size: 1.3rem;
            }
            
            select {
                font-size: 0.8rem;
                padding: 6px 10px;
                padding-right: 25px;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        /* Typing indicator */
        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #94a3b8;
            border-radius: 50%;
            opacity: 0.6;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <i class="fas fa-robot"></i>
            <span>bapXconnect</span>
        </div>
        <div class="controls">
            <div class="model-selector">
                <select id="model-select">
                    <option value="qwen3-omni-30b-a3b-instruct">Qwen3-Omni-30B</option>
                    <option value="qwen2.5-omni" selected>Qwen2.5-Omni</option>
                    <option value="qwen2.5-coder">Qwen2.5-Coder</option>
                    <option value="llama3">Llama3</option>
                </select>
            </div>
            <div class="profile-btn" onclick="toggleSettings()">
                <i class="fas fa-user-gear"></i>
            </div>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-messages" id="chat-messages">
            <div class="message assistant-message">
                <div class="avatar assistant-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="message-content">
                    <div class="message-role">Assistant</div>
                    <div class="message-text">Hello! I'm your AI assistant powered by bapXconnect. I'm currently using the Qwen2.5-Omni model. How can I help you today?</div>
                </div>
            </div>
        </div>

        <div class="input-container">
            <div class="input-area">
                <textarea 
                    id="user-input" 
                    placeholder="Message bapXconnect..." 
                    rows="1"
                ></textarea>
                <button class="send-btn" id="send-btn" onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="info-footer">
        bapXconnect AI • Powered by Hugging Face Models
    </div>

    <script>
        // API Configuration - Using the external bapXconnect API endpoint
        const API_URL = 'https://getwinharris.github.io/bapXconnect/api/api/v1/text/generation';
        const API_KEY = 'getwinharris.github.io/bapXconnect/api';
        
        // DOM Elements
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const modelSelect = document.getElementById('model-select');

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        // Send message on Enter (without shift)
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Send message function
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            const model = modelSelect.value;

            // Add user message to chat
            addMessage('user', message);
            userInput.value = '';
            userInput.style.height = 'auto';
            scrollToBottom();

            // Show typing indicator
            const typingId = 'typing-' + Date.now();
            chatMessages.insertAdjacentHTML('beforeend', `
                <div class="message assistant-message" id="${typingId}">
                    <div class="avatar assistant-avatar">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="message-content">
                        <div class="message-role">Assistant</div>
                        <div class="typing-indicator">
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                        </div>
                    </div>
                </div>
            `);
            scrollToBottom();

            try {
                // Prepare message history for context
                const messages = getMessageHistory();
                
                // Prepare the request in Alibaba/DashScope format
                const requestBody = {
                    model: model,
                    input: {
                        messages: messages
                    },
                    parameters: {
                        temperature: 0.7,
                        max_tokens: 1500
                    }
                };

                // Send request to bapXconnect API (using the correct proxy endpoint)
                // Note: For browser-based requests, you may need to use a proxy or CORS-enabled endpoint
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-DashScope-Token': API_KEY
                    },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    throw new Error(`API request failed: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();
                
                // Remove typing indicator
                const typingElement = document.getElementById(typingId);
                if (typingElement) {
                    typingElement.remove();
                }

                // Get response text
                const content = data.output?.text || data.choices?.[0]?.message?.content || 'No response from model';
                
                // Add assistant response
                addMessage('assistant', content);
                
            } catch (error) {
                console.error('Error:', error);
                
                // Remove typing indicator
                const typingElement = document.getElementById(typingId);
                if (typingElement) {
                    typingElement.remove();
                }

                // Add error message
                addMessage('assistant', `Error: ${error.message}. Please check your connection to the Hugging Face models.`);
            }
            
            scrollToBottom();
        }

        // Add message to chat
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}-message`;
            
            const avatarClass = role === 'user' ? 'user-avatar' : 'assistant-avatar';
            const avatarIcon = role === 'user' ? 'fa-user' : 'fa-robot';
            const roleName = role === 'user' ? 'You' : 'Assistant';
            
            messageDiv.innerHTML = `
                <div class="avatar ${avatarClass}">
                    <i class="fas ${avatarIcon}"></i>
                </div>
                <div class="message-content">
                    <div class="message-role">${roleName}</div>
                    <div class="message-text">${content}</div>
                </div>
            `;
            
            chatMessages.appendChild(messageDiv);
        }

        // Get message history for context
        function getMessageHistory() {
            const messages = [];
            const messageElements = document.querySelectorAll('.message');
            
            messageElements.forEach(el => {
                if (el.classList.contains('user-message')) {
                    const content = el.querySelector('.message-text').textContent;
                    messages.push({ role: 'user', content: content });
                } else if (el.classList.contains('assistant-message')) {
                    // Skip typing indicators
                    if (!el.querySelector('.typing-indicator')) {
                        const content = el.querySelector('.message-text').textContent;
                        messages.push({ role: 'assistant', content: content });
                    }
                }
            });
            
            return messages;
        }

        // Scroll to bottom of chat
        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Toggle settings/profile modal
        function toggleSettings() {
            alert('Settings/Profile page would open here. Admin access: getwinharris@gmail.com / bapX2025#');
        }

        // Initial focus on input
        userInput.focus();
        scrollToBottom();

        // Handle window resize for proper scrolling
        window.addEventListener('resize', scrollToBottom);
    </script>
</body>
</html>
